site_name: NEMI
site_description: Native Emergent Manifold Interrogation
site_author: Maike Sonnewald
repo_url: https://github.com/maikejulie/NEMI
repo_name: maikejulie/NEMI
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.expand
    - navigation.sections
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - About: about.md
  - Installation: installation.md
  - "Tutorial: First analysis": quickstart.md
  - API reference: reference.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            members_order: source
            show_source: true
            show_root_heading: true
